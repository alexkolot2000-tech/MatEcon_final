<!DOCTYPE html>
<html lang="ru">
<head>
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Экономика тренажёр</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<div id="menu" class="container">

  <h1>📚 Economics Trainer</h1>

  <div class="modes">

    <div class="card" onclick="openMode('main')">
      📘<br>Задачи
    </div>

    <div class="card" onclick="openMode('theory')">
      📖<br>Теория
    </div>

    <div class="card" onclick="openMode('blitz')">
      ⚡<br>Блиц
    </div>

    <div class="card" onclick="showAchievements()">
      🏆<br>Достижения
    </div>

    <div class="card" onclick="showStats()">
      📊<br>Статистика
    </div>

    <div class="card" onclick="showProgressGraph()">
      📈<br>Прогресс
    </div>

  </div>

</div>

<div id="app" class="container hidden">
  <button onclick="goBack()">Назад</button>
  <div id="content"></div>
</div>

<script src="data/theory.js"></script>
<script src="data/tasks.js"></script>
<script src="app.js"></script>

<div id="toast"></div>

<script src="tasks.js"></script>
<script src="theory.js"></script>
<script src="app.js"></script>

</body>
</html>
